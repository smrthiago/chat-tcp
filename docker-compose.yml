version: '3.8'

services:

  # ── Servidor ────────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: chat-server
    hostname: chat-server
    ports:
      - "5000:5000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - MAX_CLIENTS=50
      - LOG_LEVEL=INFO
      - ENABLE_ENCRYPTION=true
    volumes:
      - ./logs:/app/logs # Persiste logs fora do container
      - ./src:/app/src # Hot reload em desenvolvimento
    networks:
      - chat-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "5000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Cliente (uso: docker-compose run --rm client) ─────────────────────────
  # Nota: clientes interativos são melhor executados diretamente via Python.
  # Este serviço é para demonstração ou automação.
  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: chat-client
    stdin_open: true # Mantém STDIN aberto para input interativo
    tty: true # Aloca pseudo-TTY
    environment:
      - SERVER_HOST=server # Usa o hostname do serviço Docker
      - SERVER_PORT=5000
    depends_on:
      server:
        condition: service_healthy
    networks:
      - chat-network
    profiles:
      - client # Não sobe automaticamente com "docker-compose up"

networks:
  chat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
